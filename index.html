<title>PBJ Booking Console — POC</title>
<style>
  :root{
    --bg:#FAF6EF; --surface:#FFFFFF; --surface-2:#F4EDE1; --surface-3:#EDE3D2;
    --ink:#1F1A17; --muted:#7A7069; --faint:#9A8F84; --line:#E7DECF;
    --accent:#C8781F; --accent-ink:#8A4E10; --accent-soft:#FBEAD1;
    --good:#2C8A57; --good-soft:#DBEFE3; --warn:#B57A12; --warn-soft:#F6E9CC;
    --bad:#BC442C; --bad-soft:#F6DDD5; --info:#3665A6; --info-soft:#DCE6F4;
    --shadow:0 1px 2px rgba(31,26,23,.06),0 8px 24px rgba(31,26,23,.06);
    --radius:14px; --radius-sm:9px;
    --sans:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#141017; --surface:#1C1720; --surface-2:#241D29; --surface-3:#2C2431;
      --ink:#F3ECE2; --muted:#A99C93; --faint:#8A7E88; --line:#322935;
      --accent:#F0A94A; --accent-ink:#F7C983; --accent-soft:#3A2A18;
      --good:#4FB57F; --good-soft:#183226; --warn:#E0A63E; --warn-soft:#352815;
      --bad:#E37257; --bad-soft:#3A211A; --info:#6D9BDB; --info-soft:#1B2740;
      --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"]{
    --bg:#FAF6EF; --surface:#FFFFFF; --surface-2:#F4EDE1; --surface-3:#EDE3D2;
    --ink:#1F1A17; --muted:#7A7069; --faint:#9A8F84; --line:#E7DECF;
    --accent:#C8781F; --accent-ink:#8A4E10; --accent-soft:#FBEAD1;
    --good:#2C8A57; --good-soft:#DBEFE3; --warn:#B57A12; --warn-soft:#F6E9CC;
    --bad:#BC442C; --bad-soft:#F6DDD5; --info:#3665A6; --info-soft:#DCE6F4;
    --shadow:0 1px 2px rgba(31,26,23,.06),0 8px 24px rgba(31,26,23,.06);
  }
  :root[data-theme="dark"]{
    --bg:#141017; --surface:#1C1720; --surface-2:#241D29; --surface-3:#2C2431;
    --ink:#F3ECE2; --muted:#A99C93; --faint:#8A7E88; --line:#322935;
    --accent:#F0A94A; --accent-ink:#F7C983; --accent-soft:#3A2A18;
    --good:#4FB57F; --good-soft:#183226; --warn:#E0A63E; --warn-soft:#352815;
    --bad:#E37257; --bad-soft:#3A211A; --info:#6D9BDB; --info-soft:#1B2740;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
  .tnum{font-variant-numeric:tabular-nums}
  button{font-family:inherit;cursor:pointer}
  h1,h2,h3{margin:0;text-wrap:balance}
  a{color:inherit}

  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}

  /* ---------- rail ---------- */
  .rail{background:var(--surface);border-right:1px solid var(--line);
    display:flex;flex-direction:column;gap:6px;padding:20px 16px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:10px;padding:2px 6px 14px}
  .bulb{width:11px;height:11px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft),0 0 14px var(--accent)}
  .brand-name{font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:14px}
  .brand-sub{font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--faint);margin-top:2px}
  .rail-label{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);
    padding:14px 8px 6px}
  .role-btn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:1px solid transparent;
    background:transparent;color:var(--muted);padding:9px 10px;border-radius:var(--radius-sm);font-size:14px;font-weight:600}
  .role-btn .ic{width:22px;height:22px;display:grid;place-items:center;border-radius:6px;
    background:var(--surface-2);font-size:13px}
  .role-btn:hover{background:var(--surface-2);color:var(--ink)}
  .role-btn.active{background:var(--accent-soft);color:var(--accent-ink);border-color:transparent}
  .role-btn.active .ic{background:var(--accent);color:#fff}
  :root[data-theme="dark"] .role-btn.active .ic,@media(prefers-color-scheme:dark){}
  .acting{margin-top:auto;border-top:1px solid var(--line);padding-top:14px}
  .acting label{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:6px}
  select{width:100%;font-family:inherit;font-size:13.5px;color:var(--ink);background:var(--surface-2);
    border:1px solid var(--line);border-radius:var(--radius-sm);padding:8px 9px;font-weight:600}
  .theme-toggle{margin-top:10px;width:100%;border:1px solid var(--line);background:var(--surface-2);
    color:var(--muted);border-radius:var(--radius-sm);padding:7px;font-size:12px;font-weight:600}
  .theme-toggle:hover{color:var(--ink)}

  /* ---------- main ---------- */
  .main{min-width:0;display:flex;flex-direction:column}
  .topbar{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;
    padding:22px 30px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:5}
  .topbar h1{font-size:22px;letter-spacing:-.01em}
  .topbar .who{font-size:12.5px;color:var(--muted);margin-top:3px}
  .tabs{display:flex;gap:4px}
  .tab{border:none;background:transparent;color:var(--muted);padding:7px 12px;border-radius:8px;
    font-size:13.5px;font-weight:600}
  .tab:hover{background:var(--surface-2);color:var(--ink)}
  .tab.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}
  .content{padding:24px 30px 60px;display:flex;flex-direction:column;gap:22px;max-width:1180px}

  /* ---------- kpi ---------- */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow)}
  .kpi .k-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:600}
  .kpi .k-val{font-size:27px;font-weight:800;letter-spacing:-.02em;margin-top:6px}
  .kpi .k-val small{font-size:15px;color:var(--muted);font-weight:600}

  /* ---------- cards / sections ---------- */
  .section{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .sec-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
  .sec-head h2{font-size:15px;letter-spacing:.01em}
  .sec-head .hint{font-size:12px;color:var(--muted)}
  .sec-body{padding:6px 8px}
  .empty{padding:30px 18px;text-align:center;color:var(--faint);font-size:13.5px}

  /* rows */
  .row{display:flex;align-items:center;gap:14px;padding:12px 12px;border-radius:10px}
  .row+.row{border-top:1px solid var(--line)}
  .row:hover{background:var(--surface-2)}
  .av{width:38px;height:38px;border-radius:9px;flex:none;display:grid;place-items:center;font-weight:800;
    font-size:13px;color:var(--accent-ink);background:var(--accent-soft);letter-spacing:.02em}
  .row .grow{min-width:0;flex:1}
  .row .name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .meta{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .right{display:flex;align-items:center;gap:8px;flex:none}
  .fee{font-weight:800;font-size:15px}
  .subtle{color:var(--muted);font-size:12.5px}

  /* pills */
  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;letter-spacing:.02em;
    padding:3px 9px;border-radius:999px;white-space:nowrap}
  .pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.9}
  .p-open{color:var(--info);background:var(--info-soft)}
  .p-pending{color:var(--warn);background:var(--warn-soft)}
  .p-approved,.p-accepted,.p-confirmed,.p-paid{color:var(--good);background:var(--good-soft)}
  .p-declined,.p-unpaid{color:var(--bad);background:var(--bad-soft)}
  .p-invoiced{color:var(--info);background:var(--info-soft)}
  .p-filled{color:var(--muted);background:var(--surface-3)}
  .p-locked{color:var(--faint);background:var(--surface-3)}

  .tag{font-size:11px;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);
    padding:2px 8px;border-radius:999px;white-space:nowrap}

  /* buttons */
  .btn{border:1px solid var(--line);background:var(--surface);color:var(--ink);font-weight:700;font-size:13px;
    padding:7px 13px;border-radius:9px;white-space:nowrap}
  .btn:hover{background:var(--surface-2)}
  .btn.primary{background:var(--accent);border-color:transparent;color:#fff}
  .btn.primary:hover{filter:brightness(1.05)}
  .btn.good{background:var(--good);border-color:transparent;color:#fff}
  .btn.ghost-bad{color:var(--bad);border-color:var(--line)}
  .btn.ghost-bad:hover{background:var(--bad-soft)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn:disabled{opacity:.5;cursor:default}

  /* form */
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;padding:16px 18px;align-items:end}
  .field label{display:block;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:5px}
  .field input,.field select{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface-2);
    border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-weight:600}
  .field input:focus,.field select:focus,select:focus{outline:2px solid var(--accent);outline-offset:1px}

  .searchbar{padding:12px 14px;border-bottom:1px solid var(--line)}
  .searchbar input{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface-2);
    border:1px solid var(--line);border-radius:9px;padding:9px 12px}
  .searchbar input:focus{outline:2px solid var(--accent);outline-offset:1px}

  .banner{font-size:12.5px;color:var(--muted);background:var(--surface-2);border:1px dashed var(--line);
    border-radius:var(--radius);padding:12px 16px;display:flex;gap:8px;align-items:center}
  .banner b{color:var(--ink)}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:11px;font-size:13.5px;font-weight:600;
    box-shadow:var(--shadow);transition:.25s;z-index:50;pointer-events:none;max-width:90vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:820px){
    .app{grid-template-columns:1fr}
    .rail{position:static;height:auto;flex-direction:row;flex-wrap:wrap;align-items:center;gap:8px}
    .brand{padding:0 8px 0 0;border:none;width:100%}
    .rail-label{display:none}
    .role-btn{width:auto}.acting{margin:0;border:none;padding:0;display:flex;gap:8px;align-items:center;width:100%}
    .acting label{display:none}.theme-toggle{width:auto;margin:0}
    .content{padding:18px 16px 60px}.topbar{padding:16px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

<div class="app">
  <nav class="rail">
    <div class="brand">
      <span class="bulb"></span>
      <div><div class="brand-name">PBJ</div><div class="brand-sub">Booking</div></div>
    </div>
    <div class="rail-label">View as</div>
    <button class="role-btn" data-role="admin"><span class="ic">◆</span> Agency admin</button>
    <button class="role-btn" data-role="venue"><span class="ic">♦</span> Venue</button>
    <button class="role-btn" data-role="band"><span class="ic">♪</span> Band</button>

    <div class="acting">
      <div id="actingWrap"></div>
      <button class="theme-toggle" id="themeBtn">◐ Toggle theme</button>
    </div>
  </nav>

  <main class="main">
    <header class="topbar">
      <div>
        <h1 id="pageTitle">—</h1>
        <div class="who" id="pageWho"></div>
      </div>
      <div class="tabs" id="tabs"></div>
    </header>
    <div class="content" id="content"></div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================ SEED DATA ============================ */
// All bands, emails, and agents below are FICTIONAL sample data (example.com is a reserved domain).
const ARTISTS = [
  {id:'a1',  name:'Neon Harbor', genre:'Blues', email:'booking@neonharbor.example', agent:'Sam Rivera'},
  {id:'a2',  name:'The Late Setups', genre:'Top 40', email:'thelatesetups@example.com', agent:'Sam Rivera'},
  {id:'a3',  name:'Gravel & Gold', genre:'Party Rock', email:'gravelandgold@example.com', agent:'Sam Rivera'},
  {id:'a4',  name:'Sunset Radio', genre:'Reggae', email:'sunsetradio@example.com', agent:'Dana Cole'},
  {id:'a5',  name:'Paper Lanterns', genre:'Indie Rock / Covers', email:'paperlanterns@example.com', agent:'Sam Rivera'},
  {id:'a6',  name:'Mara Quinn', genre:'Acoustic / Singer-Songwriter', email:'maraquinn@example.com', agent:'Sam Rivera'},
  {id:'a7',  name:'Copper Line', genre:'Top 40 / Country', email:'copperline@example.com', agent:'Sam Rivera'},
  {id:'a8',  name:'Blue Note Three', genre:'Jazz', email:'bluenotethree@example.com', agent:'Theo Marsh'},
  {id:'a9',  name:'Dead Reckoning', genre:'Tribute (Grateful Dead)', email:'deadreckoning@example.com', agent:'Sam Rivera'},
  {id:'a10', name:'Thunder County', genre:'Classic Rock', email:'thundercounty@example.com', agent:'Sam Rivera'},
  {id:'a11', name:'The Usual Suspects', genre:'Top 40', email:'usualsuspects@example.com', agent:'Sam Rivera'},
  {id:'a12', name:'Nell Harper', genre:'Acoustic / Singer-Songwriter', email:'nellharper@example.com', agent:'Dana Cole'},
  {id:'a13', name:'Highwater Duo', genre:'Top 40', email:'highwaterduo@example.com', agent:'Dana Cole'},
  {id:'a14', name:'Delta Blue', genre:'Blues', email:'deltablue@example.com', agent:'Sam Rivera'},
  {id:'a15', name:'Owen Frost', genre:'Acoustic / Singer-Songwriter', email:'owenfrost@example.com', agent:'Theo Marsh'},
];

const VENUES = [
  {id:'v1', name:'The Rockland Tap', town:'Rockland, MA', cap:120, focus:'Top 40 / Party Rock'},
  {id:'v2', name:'Scituate Harbor Pub', town:'Scituate, MA', cap:80,  focus:'Acoustic / Duos'},
  {id:'v3', name:'Nantasket Beach Club', town:'Hull, MA', cap:300, focus:'Top 40 / Dance'},
  {id:'v4', name:'The Whaler', town:'New Bedford, MA', cap:150, focus:'Blues / Classic Rock'},
  {id:'v5', name:'Dartmouth Grange', town:'Dartmouth, MA', cap:90,  focus:'Country / Americana'},
];

// band <-> venue approval gate
let APPROVALS = [
  ['a1','v4','approved'],['a1','v1','approved'],['a1','v2','pending'],
  ['a2','v1','approved'],['a2','v3','approved'],
  ['a3','v1','approved'],['a3','v3','pending'],
  ['a6','v2','approved'],['a6','v5','approved'],
  ['a7','v5','approved'],['a7','v1','pending'],
  ['a8','v2','approved'],['a8','v4','approved'],
  ['a9','v1','approved'],['a9','v4','approved'],
  ['a10','v4','approved'],['a11','v3','approved'],['a11','v1','approved'],
  ['a12','v2','approved'],['a13','v1','approved'],['a13','v3','approved'],
  ['a14','v4','approved'],['a15','v2','approved'],
].map(([bandId,venueId,status])=>({bandId,venueId,status}));

let uid = 100;
const nid = p => p + (++uid);

// open dates posted by venues
// venues post availability + an optional budget guide; the AGENCY sets `fee`.
let SLOTS = [
  {id:'s1', venueId:'v1', date:'2026-07-18', start:'9:00 PM', budget:1500, fee:1400, notes:'Full band, main room', status:'open'},
  {id:'s2', venueId:'v1', date:'2026-08-01', start:'9:00 PM', budget:1500, fee:1600, notes:'Summer series headliner', status:'open'},
  {id:'s3', venueId:'v2', date:'2026-07-19', start:'7:00 PM', budget:500,  fee:500,  notes:'Acoustic duo, patio', status:'open'},
  {id:'s4', venueId:'v3', date:'2026-07-25', start:'8:30 PM', budget:2000, fee:2200, notes:'Beach deck, 4hr', status:'open'},
  {id:'s5', venueId:'v4', date:'2026-07-26', start:'8:00 PM', budget:1200, fee:1200, notes:'Blues night', status:'open'},
  {id:'s6', venueId:'v5', date:'2026-08-08', start:'7:30 PM', budget:900,  fee:null, notes:'Country BBQ event — needs pricing', status:'open'},
  {id:'s7', venueId:'v2', date:'2026-08-15', start:'7:00 PM', budget:600,  fee:null, notes:'Patio, weather permitting', status:'open'},
];

let APPLICATIONS = [
  {id:'ap1', slotId:'s1', bandId:'a2', status:'pending', note:'We can bring full PA + lights.'},
  {id:'ap2', slotId:'s1', bandId:'a3', status:'pending', note:'Available, played here in May.'},
  {id:'ap3', slotId:'s5', bandId:'a1', status:'pending', note:'Duo format works great for blues night.'},
  {id:'ap4', slotId:'s4', bandId:'a11', status:'pending', note:''},
];

// already-confirmed gigs (with payment lifecycle)
let GIGS = [
  {id:'g1', slotId:null, venueId:'v4', bandId:'a1',  date:'2026-06-14', start:'8:00 PM', fee:1200, payment:'paid',     loadIn:'6:30 PM', notes:'Backline provided.'},
  {id:'g2', slotId:null, venueId:'v1', bandId:'a2',  date:'2026-07-04', start:'9:00 PM', fee:1500, payment:'invoiced', loadIn:'7:00 PM', notes:'July 4th — sold out.'},
  {id:'g3', slotId:null, venueId:'v2', bandId:'a6',  date:'2026-07-11', start:'7:00 PM', fee:500,  payment:'unpaid',   loadIn:'6:15 PM', notes:'Solo set.'},
  {id:'g4', slotId:null, venueId:'v5', bandId:'a7',  date:'2026-07-12', start:'7:30 PM', fee:900,  payment:'unpaid',   loadIn:'6:00 PM', notes:''},
];

/* ============================ STATE ============================ */
const state = {
  role:'admin',
  actingVenueId:'v1',
  actingBandId:'a1',
  tab:{admin:'overview', venue:'dates', band:'browse'},
  search:'',
};

/* ============================ HELPERS ============================ */
const $ = s => document.querySelector(s);
const money = n => '$'+n.toLocaleString('en-US');
const moneyOrTBD = n => n!=null ? `<span class="fee tnum">${money(n)}</span>` : `<span class="pill p-pending">Fee TBD</span>`;
const artist = id => ARTISTS.find(a=>a.id===id);
const venue  = id => VENUES.find(v=>v.id===id);
const slot   = id => SLOTS.find(s=>s.id===id);
function initials(name){
  return name.replace(/[^A-Za-z0-9 ]/g,'').split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase()||'?';
}
function fmtDate(iso){
  const [y,m,d]=iso.split('-').map(Number);
  const dt=new Date(y,m-1,d);
  return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function approvalStatus(bandId,venueId){
  const a=APPROVALS.find(x=>x.bandId===bandId&&x.venueId===venueId);
  return a?a.status:'none';
}
function pill(status){
  const map={open:'Open',pending:'Pending',approved:'Approved',accepted:'Accepted',declined:'Declined',
    confirmed:'Confirmed',paid:'Paid',unpaid:'Unpaid',invoiced:'Invoiced',filled:'Filled',locked:'Not approved'};
  return `<span class="pill p-${status}">${map[status]||status}</span>`;
}
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),2200);
}

/* ============================ ACTIONS ============================ */
const actions = {
  bandApply(slotId){
    const bandId=state.actingBandId;
    if(APPLICATIONS.some(a=>a.slotId===slotId&&a.bandId===bandId)){toast('Already applied');return;}
    APPLICATIONS.push({id:nid('ap'),slotId,bandId,status:'pending',note:''});
    toast('Application sent to '+venue(slot(slotId).venueId).name);
    render();
  },
  bandRequestApproval(venueId){
    const bandId=state.actingBandId;
    if(approvalStatus(bandId,venueId)!=='none'){toast('Request already on file');return;}
    APPROVALS.push({bandId,venueId,status:'pending'});
    toast('Approval requested at '+venue(venueId).name);
    render();
  },
  venueAccept(appId){
    const ap=APPLICATIONS.find(a=>a.id===appId); if(!ap)return;
    const sl=slot(ap.slotId);
    if(sl.fee==null){toast('Agency hasn’t set the fee for this date yet');return;}
    ap.status='accepted'; sl.status='filled';
    APPLICATIONS.filter(a=>a.slotId===sl.id&&a.id!==appId&&a.status==='pending').forEach(a=>a.status='declined');
    GIGS.push({id:nid('g'),slotId:sl.id,venueId:sl.venueId,bandId:ap.bandId,date:sl.date,start:sl.start,
      fee:sl.fee,payment:'unpaid',loadIn:'',notes:sl.notes});
    toast(artist(ap.bandId).name+' booked — gig confirmed');
    render();
  },
  venueDecline(appId){
    const ap=APPLICATIONS.find(a=>a.id===appId); if(ap){ap.status='declined';toast('Application declined');render();}
  },
  approveBand(bandId,venueId){
    const a=APPROVALS.find(x=>x.bandId===bandId&&x.venueId===venueId);
    if(a){a.status='approved';toast(artist(bandId).name+' approved to apply');render();}
  },
  declineBand(bandId,venueId){
    APPROVALS=APPROVALS.filter(x=>!(x.bandId===bandId&&x.venueId===venueId));
    toast('Approval request removed'); render();
  },
  setPayment(gigId,val){
    const g=GIGS.find(x=>x.id===gigId); if(g){g.payment=val;toast('Payment marked '+val);render();}
  },
  setFee(e){
    e.preventDefault();
    const f=e.target, s=slot(f.dataset.setfee);
    const v=parseInt(f.querySelector('input').value,10);
    if(!v||v<=0){toast('Enter a fee');return;}
    s.fee=v; toast(venue(s.venueId).name+' · '+fmtDate(s.date)+' priced at '+money(v)); render();
  },
  postDate(e){
    e.preventDefault();
    const f=e.target;
    const date=f.date.value, start=f.start.value.trim()||'8:00 PM', budget=parseInt(f.budget.value,10)||null, notes=f.notes.value.trim();
    if(!date){toast('Pick a date');return;}
    SLOTS.push({id:nid('s'),venueId:state.actingVenueId,date,start,budget,fee:null,notes,status:'open'});
    toast('Date posted — sent to agency for pricing'); f.reset(); render();
  },
};

function kpi(label,val,sub){return `<div class="kpi"><div class="k-label">${label}</div><div class="k-val tnum">${val}${sub?` <small>${sub}</small>`:''}</div></div>`;}
function avatar(name){return `<div class="av">${initials(name)}</div>`;}

function slotRow(s,right){

function fmtDateStack(iso){
  const [y,m,d]=iso.split('-').map(Number); const dt=new Date(y,m-1,d);
  return `<div style="line-height:1;text-align:center"><div style="font-size:9px;letter-spacing:.06em;text-transform:uppercase">${dt.toLocaleDateString('en-US',{month:'short'})}</div><div style="font-size:16px;font-weight:800">${d}</div></div>`;
}

    <div class="sec-body">
      ${list.sort((a,b)=>a.date<b.date?1:-1).map(g=>{
        const v=venue(g.venueId),a=artist(g.bandId);
        const next = g.payment==='unpaid'?`<button class="btn sm" data-pay="${g.id}|invoiced">Send invoice</button>`
          : g.payment==='invoiced'?`<button class="btn good sm" data-pay="${g.id}|paid">Mark paid</button>`
          : `<button class="btn sm" data-pay="${g.id}|invoiced" disabled>Paid ✓</button>`;
        return `<div class="row">${avatar(a.name)}
          <div class="grow"><div class="name">${a.name} <span class="subtle">· ${v.name}</span></div>
          <div class="meta">${fmtDate(g.date)} · ${g.start}</div></div>
          <div class="right"><span class="fee tnum">${money(g.fee)}</span>${pill(g.payment)}${next}</div></div>`;
      }).join('')||'<div class="empty">No booked gigs.</div>'}
    </div>
  </section>`;
}

/* ============================ EVENTS ============================ */
document.addEventListener('click',e=>{
  const b=e.target.closest('[data-role],[data-tab],[data-apply],[data-reqapproval],[data-accept],[data-decline],[data-approve],[data-declineband],[data-pay]');
  if(!b)return;
  if(b.dataset.role){state.role=b.dataset.role;state.search='';render();return;}
  if(b.dataset.tab){state.tab[state.role]=b.dataset.tab;render();return;}
  if(b.dataset.apply){actions.bandApply(b.dataset.apply);return;}
  if(b.dataset.reqapproval){actions.bandRequestApproval(b.dataset.reqapproval);return;}
  if(b.dataset.accept){actions.venueAccept(b.dataset.accept);return;}
  if(b.dataset.decline){actions.venueDecline(b.dataset.decline);return;}
  if(b.dataset.approve){const[bid,vid]=b.dataset.approve.split('|');actions.approveBand(bid,vid);return;}
  if(b.dataset.declineband){const[bid,vid]=b.dataset.declineband.split('|');actions.declineBand(bid,vid);return;}
  if(b.dataset.pay){const[gid,val]=b.dataset.pay.split('|');actions.setPayment(gid,val);return;}
});
document.addEventListener('input',e=>{
  if(e.target.matches('[data-search]')){state.search=e.target.value;
    const list=$('#content .sec-body');/* re-render roster live */ renderRosterLive();}
});
function renderRosterLive(){ if(state.role==='admin'&&state.tab.admin==='roster'){
  const cur=$('[data-search]'); const pos=cur&&cur.selectionStart;
  $('#content').innerHTML=adminRoster();
  const inp=$('[data-search]'); if(inp){inp.focus(); if(pos!=null)inp.setSelectionRange(pos,pos);}
}}
document.addEventListener('change',e=>{
  if(e.target.matches('[data-acting="venue"]')){state.actingVenueId=e.target.value;render();}
  if(e.target.matches('[data-acting="band"]')){state.actingBandId=e.target.value;render();}
});
document.addEventListener('submit',e=>{
  if(e.target.matches('[data-postdate]'))actions.postDate(e);
  if(e.target.matches('[data-setfee]'))actions.setFee(e);
});

$('#themeBtn').addEventListener('click',()=>{
  const root=document.documentElement;
  const cur=root.getAttribute('data-theme')|| (matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  root.setAttribute('data-theme',cur==='dark'?'light':'dark');
});

/* two-col responsive fix */
const mq=matchMedia('(max-width:720px)');
function applyCols(){document.querySelectorAll('.two-col').forEach(el=>el.style.gridTemplateColumns=mq.matches?'1fr':'1fr 1fr');}
mq.addEventListener('change',applyCols);
const _r=render; render=function(){_r();applyCols();};

render();
</script>
